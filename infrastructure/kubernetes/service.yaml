apiVersion: v1
kind: Service
metadata:
  name: engine-server
  labels:
    app: engine-server
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  selector:
    app: engine-server
---
apiVersion: v1
kind: Service
metadata:
  name: engine-server-external
  labels:
    app: engine-server
spec:
  type: LoadBalancer
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: engine-server
