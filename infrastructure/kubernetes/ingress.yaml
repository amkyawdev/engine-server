apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: engine-server
  labels:
    app: engine-server
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - engine-server.example.com
      secretName: engine-server-tls
  rules:
    - host: engine-server.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: engine-server
                port:
                  number: 80
